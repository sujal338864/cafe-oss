version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: shopos-db
    environment:
      POSTGRES_USER: shopos
      POSTGRES_PASSWORD: shopos_dev_password
      POSTGRES_DB: shopos
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shopos"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Caching & Queue
  redis:
    image: redis:7-alpine
    container_name: shopos-redis
    ports:
      - "6379:6379"

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: shopos-api
    environment:
      DATABASE_URL: "postgresql://shopos:shopos_dev_password@postgres:5432/shopos"
      JWT_SECRET: "dev-secret-key-min-32-characters-long"
      PORT: 4001
      NODE_ENV: development
      FRONTEND_URL: "http://localhost:3000"
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      RUN_WORKERS: "false"
    ports:
      - "4001:4001"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend/src:/app/src
    command: npm run dev

  # Background Worker Node 👷🏽
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: shopos-worker
    environment:
      DATABASE_URL: "postgresql://shopos:shopos_dev_password@postgres:5432/shopos"
      JWT_SECRET: "dev-secret-key-min-32-characters-long"
      NODE_ENV: development
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      RUN_API: "false"
      RUN_WORKERS: "true"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./backend/src:/app/src
    command: npm run dev

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: shopos-web
    environment:
      NEXT_PUBLIC_API_URL: "http://localhost:4001"
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend/src:/app/src

volumes:
  postgres_data:

networks:
  default:
    name: shopos-network
